spring.application.name=auction-service
server.port=8080
spring.datasource.url=jdbc:postgresql://localhost:5432/auctiondb
spring.datasource.username=auctionuser
spring.datasource.password=auctionpass
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.table=flyway_auction_schema_history
spring.kafka.bootstrap-servers=[::1]:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# SQS delayed auction-end processing (disabled by default; uses in-memory scheduler)
# auction-service.sqs.enabled=true
auction-service.sqs.queue-name=auction-end-queue
auction-service.sqs.endpoint=http://localhost:4566
auction-service.sqs.region=us-east-1

# Auction extension: minutes added to endsAt when a bid arrives near end
auction-service.extension.minutes=5
# Auction bid window: "bid in last N minutes" triggers extension
auction-service.bid-window.minutes=5
logging.level.com.example.auctionservice=INFO
