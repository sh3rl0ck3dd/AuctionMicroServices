services:
  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=auctiondb
      - POSTGRES_USER=auctionuser
      - POSTGRES_PASSWORD=auctionpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "auctionuser", "-d", "auctiondb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs
      - DEFAULT_REGION=us-east-1
      - LOCALSTACK_AUTH_TOKEN=ls-kotOgise-JUZu-PAYE-kAkI-5546feBoba3b
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  sqs-init:
    image: amazon/aws-cli:latest
    container_name: sqs-init
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: >
      sh -c "
        aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name auction-end-queue --region us-east-1 || true
      "

  auction-service:
    image: eclipse-temurin:26-jdk
    container_name: auction-service
    working_dir: /app
    command: sh -c "apt-get update -qq && apt-get install -y -qq curl && sh gradlew bootRun"
    ports:
      - "8080:8080"
    volumes:
      - ./auction-service:/app
      - gradle_auction_cache:/root/.gradle
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/auctiondb
      - SPRING_DATASOURCE_USERNAME=auctionuser
      - SPRING_DATASOURCE_PASSWORD=auctionpass
      - AUCTION_SERVICE_SQS_ENABLED=true
      - AUCTION_SERVICE_SQS_ENDPOINT=http://localstack:4566
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      localstack:
        condition: service_healthy
      sqs-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  bidding-service:
    image: eclipse-temurin:26-jdk
    container_name: bidding-service
    working_dir: /app
    command: sh -c "apt-get update -qq && apt-get install -y -qq curl && sh gradlew bootRun"
    ports:
      - "8082:8082"
    volumes:
      - ./bidding-service:/app
      - gradle_bidding_cache:/root/.gradle
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - AUCTION_SERVICE_URL=http://auction-service:8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/auctiondb
      - SPRING_DATASOURCE_USERNAME=auctionuser
      - SPRING_DATASOURCE_PASSWORD=auctionpass
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auction-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8082/api/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  notification-service:
    image: eclipse-temurin:26-jdk
    container_name: notification-service
    working_dir: /app
    command: sh -c "apt-get update -qq && apt-get install -y -qq curl && sh gradlew bootRun"
    ports:
      - "8083:8083"
    volumes:
      - ./notification-service:/app
      - gradle_notification_cache:/root/.gradle
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8083/api/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  react-ui:
    image: node:22
    container_name: react-ui
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./react-ui:/app
      - node_modules:/app/node_modules
    environment:
      - VITE_AUCTION_SERVICE_URL=http://auction-service:8080
      - VITE_BIDDING_SERVICE_URL=http://bidding-service:8082
      - VITE_NOTIFICATION_SERVICE_URL=http://notification-service:8083
    depends_on:
      auction-service:
        condition: service_healthy
      bidding-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy

volumes:
  postgres_data:
  localstack_data:
  gradle_auction_cache:
  gradle_bidding_cache:
  gradle_notification_cache:
  node_modules:
